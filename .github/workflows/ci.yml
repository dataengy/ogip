# Thin frontend — all logic lives in .ci/steps/ (callable locally via `.ci/run.sh <step>`).
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: { enable-cache: true }
      - run: .ci/run.sh lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: { enable-cache: true }
      - run: .ci/run.sh typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: { enable-cache: true }
      - run: .ci/run.sh test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with: { enable-cache: true }
      - run: .ci/run.sh e2e # runs the Prefect pipeline end-to-end on the demo fixture

  bash-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: .ci/run.sh bash-lint

  commit-binding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 } # needs history: the step walks base..HEAD
      - run: .ci/run.sh commit-binding

  structure-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: .ci/run.sh structure-validate
      - run: .ci/run.sh lfs-guard # large test datasets must be LFS pointers, not raw blobs

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      # Version-safe full-repo scan (avoids gitleaks-action's `firstCommit^..` range,
      # which is invalid on a root commit).
      - run: docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:latest detect --source=/repo --redact --no-banner
