version: 2
models:
- name: console_pricing
  columns:
  - name: game_sk
    data_tests:
    - not_null
  - name: locale
    data_tests:
    - not_null
  - name: psn_price
    data_tests:
    - dbt_utils.accepted_range:
        min_value: 0
  - name: psn_currency
  data_tests:
  - dbt_utils.unique_combination_of_columns:
      combination_of_columns:
      - game_sk
      - locale
- name: critic_reception
  columns:
  - name: game_sk
    data_tests:
    - not_null
    - unique
  - name: metacritic_score
    data_tests:
    - dbt_utils.accepted_range:
        min_value: 0
        max_value: 100
  - name: opencritic_score
    data_tests:
    - dbt_utils.accepted_range:
        min_value: 0
        max_value: 100
- name: game
  columns:
  - name: game_sk
    data_tests:
    - not_null
    - unique
  - name: title
    data_tests:
    - not_null
  - name: metacritic
    data_tests:
    - dbt_utils.accepted_range:
        min_value: 0
        max_value: 100
- name: traction
  columns:
  - name: game_sk
    data_tests:
    - not_null
    - unique
  - name: current_players
    data_tests:
    - dbt_utils.accepted_range:
        min_value: 0
  - name: peak_24h
    data_tests:
    - dbt_utils.accepted_range:
        min_value: 0
  - name: peak_all
    data_tests:
    - dbt_utils.accepted_range:
        min_value: 0
- name: market_features
  columns:
  - name: game_sk
    data_tests:
    - not_null
    - unique
  - name: popularity_score
    data_tests:
    - dbt_utils.accepted_range:
        min_value: 0
  - name: critic_score
    data_tests:
    - dbt_utils.accepted_range:
        min_value: 0
        max_value: 1
  - name: metacritic_score
    data_tests:
    - dbt_utils.accepted_range:
        min_value: 0
        max_value: 100
  - name: opencritic_score
    data_tests:
    - dbt_utils.accepted_range:
        min_value: 0
        max_value: 100
  - name: avg_critic_score
    data_tests:
    - dbt_utils.accepted_range:
        min_value: 0
        max_value: 100
  - name: psn_price_usd
    data_tests:
    - dbt_utils.accepted_range:
        min_value: 0
  - name: psn_currency
  - name: peak_players
    data_tests:
    - dbt_utils.accepted_range:
        min_value: 0
  - name: has_critic_reception
    data_tests:
    - not_null
  - name: has_console_pricing
    data_tests:
    - not_null
  - name: has_traction
    data_tests:
    - not_null
- name: metacritic__game
  description: Layer-0 registration of the immutable Metacritic games Parquet (1:1
    AS-IS).
  columns:
  - name: slug
    data_tests:
    - not_null
  - name: content_hash
    data_tests:
    - not_null
  - name: source_url
    data_tests:
    - not_null
- name: opencritic__game
  description: Layer-0 registration of the immutable OpenCritic games Parquet (1:1
    AS-IS).
  columns:
