steam_appdetails_regional:
  system: steam
  entity: appdetails_regional
  # THE regional-pricing feed (backlog row 1; the product Hushcrasher's pricing tool is
  # built on) — and the sanctioned substitute SteamDB's own FAQ points to ("get the
