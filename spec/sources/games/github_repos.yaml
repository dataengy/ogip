github_repos:
  system: github
  entity: repos
  # The ONE genuine Airbyte fit found in the 2026-07-20 registry audit (591 sources
  # scanned): the certified pool is own-account SaaS extractors, structurally mismatched
  # with public market data — source-github is the exception because GitHub's public data
  # IS the product. Domain angle: game-ENGINE ecosystem activity (Godot/Bevy/O3DE and the
  # modding/tooling long tail) — engine is a literal input to the budget/scope models in
  # the Hushcrasher domain; stars/releases/contributor velocity are public adoption
  # signals for it.
  url: https://api.github.com/repos/godotengine/godot
  auth: none # keyless works for public data (probe-verified); token raises 60/hr → 5000/hr
  tier: direct
  publishable: false
  license: github-tos-unreviewed
  license_note: >
    GitHub ToS permit API use; acceptable-use limits on aggregate redistribution have NOT
    been reviewed against publishing derived datasets — publishable stays false until that
    review is recorded here. Public-repo metadata only; never user personal data.
  key_param: null # token goes in the Authorization header, not a query param
  slot: GITHUB_TOKEN # optional for probing; REQUIRED for real syncs (rate limits)
  records_path: null # single repo object at this probe endpoint
  probe_params: {}
  rate_limit_note: >
    MEASURED 2026-07-20: keyless = 60 req/hr (x-ratelimit-limit header); authenticated
    PAT = 5,000/hr; GraphQL and search have separate budgets. The Airbyte connector
    handles secondary rate limits (retry-after + abuse detection) itself.
  traps: >
    Stars/forks counts on /repos are cached aggregates — near-real-time, not exact at
    scale. `open_issues_count` INCLUDES pull requests (GitHub API quirk since v3);
    subtract the PR count or the issues signal is inflated by roughly half on active
    repos (verified: godot open_issues_count=18597 includes PRs).
