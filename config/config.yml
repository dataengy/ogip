# OGIP — application configuration (tracked). SINGLE SOURCE OF TRUTH for every
# non-secret default: Python (src/ogip/config.py) reads it directly; docker compose
# consumes it via the rendered .env (config/.env-render.py). Secrets NEVER live here.

platform:
  data_dir: .run/data # runtime zones: warehouse/, raw/, outputs/ (gitignored)
  log_dir: .run/logs # canonical log home — never the repo root (gitignored)
  log_level: INFO
  log_json: true # JSON logs → Loki parsed labels (obs)

storage: # ADR-0003 / D2 — Parquet lake
  backend: local # local (default, FS) | minio | s3 | r2
  endpoint_url: "" # set for minio/s3/r2 via .env (e.g. Cloudflare R2 endpoint)
  raw_bucket: ogip-raw
  region: auto

postgres: # ADR-0008 — landing zone + platform_meta + Prefect backend
  host: localhost
  port: 5432
  user: ogip
  database: ogip
  landing_schema: landing # scraped/parsed intermediate (D11)
  meta_schema: platform_meta # run stats, watermarks, DQ results
  airbyte_schema: airbyte_raw # experimental Airbyte evaluation lane (#41) ONLY — not the prod path

services: # compose port mappings (rendered into .env)
  postgres_port: 5432
  prefect_port: 4200
  minio_api_port: 9000
  minio_console_port: 9001
  victoriametrics_port: 8428
  loki_port: 3100
  grafana_port: 3300
  evidence_port: 3400 # optional Evidence visualizer (experimental/bi, D8)
  airbyte_port: 8000 # experimental Airbyte evaluation lane (#41); abctl's local ingress

endpoints:
  prefect_api_url: http://localhost:4200/api

transformation:
  engine: sqlmesh # default transform engine (ADR-0004, D5); compiled from spec/

ingestion:
  engine: dlt # default (ADR-0006, D11)
  cdc_loader: ingestr # optional — CDC from the Postgres landing zone

secrets:
  backend: env # ADR-0011 / D10 — env (default) | github (CI) | bitwarden | git-secret

prefect:
  runtime: ephemeral # ephemeral (default) | server (+ Postgres compose) — D3

# Run profiles: `just run-profile <name>` — orchestrator × engine setups (A12).
run_profiles:
  prefect-sqlmesh: # DEFAULT / production
    default: true
    services: [postgres, prefect]
    orchestrator: prefect
    ingestion: dlt
    transform: sqlmesh
  prefect-sql:
    services: [postgres, prefect]
    orchestrator: prefect
    ingestion: dlt
    transform: plain_sql
  prefect-bruin: # complete alternative setup
    services: [postgres, prefect]
    orchestrator: prefect
    ingestion: dlt
    transform: bruin
  prefect-dbt:
    services: [postgres, prefect]
    orchestrator: prefect
    ingestion: dlt
    transform: dbt
  prefect-opendbt: # dbt-core extended (opendbt) over the SAME generated dbt project
    services: [postgres, prefect]
    orchestrator: prefect
    ingestion: dlt
    transform: opendbt
  prefect-sqlmesh-over-dbt:
    services: [postgres, prefect]
    orchestrator: prefect
    ingestion: dlt
    transform: sqlmesh_dbt
  prefect-dagster-dlt-dbt: # complete alternative setup
    services: [postgres, prefect]
    orchestrator: dagster
    ingestion: dlt
    transform: dbt
  prefect-over-dagster: # Prefect wraps Dagster (dlt+dbt only); Prefect owns ML/scraping/obs/alerting
    services: [postgres, prefect]
    orchestrator: prefect
    ingestion: dlt
    transform: dagster

sources:
  rawg: # M0 walking-skeleton source (clean documented REST)
    enabled: true
    entities: [games]
  metacritic: # first scraped source (#18; HLTB is legally blocked — see spec/sources/)
    enabled: true # demo-safe: fixture-driven without network; live mode reads `slugs`
    entities: [game]
    slugs: [hades] # live-mode page set; discovery-from-raw is the next increment
  opencritic: # second critic aggregator (#18); publishable:false until ToS review — spec/sources/
    enabled: true # demo-safe by default; live mode (OGIP_OPENCRITIC_LIVE=1) reads `pages`
    entities: [game]
    pages: ["1548/the-legend-of-zelda-breath-of-the-wild"] # id/slug; the id governs, slug is decorative
  psn: # console regional pricing (#18); publishable:false until Sony ToS review — spec/sources/
    enabled: true # demo-safe by default; live mode (OGIP_PSN_LIVE=1) reads `concepts`
    entities: [concept]
    concepts: ["en-us/concept/232093"] # {locale}/concept/{id}; one row per regional storefront
  steamcharts: # concurrent-player traction (#18); css scrape; publishable:false — spec/sources/
    enabled: true # demo-safe by default; live mode (OGIP_STEAMCHARTS_LIVE=1) reads `appids`
    entities: [app]
    appids: [730] # discovery-from-raw (steamspy/steam crosswalk) is the next increment
  steam:
    enabled: true
    entities: [games, reviews]
  igdb:
    enabled: false
    entities: [games]

# Scraping resilience knobs (ADR-0014) — consumed by ingestion/common/http.py.
scraping:
  max_connections: 8 # global concurrent-fetch cap
  per_domain: 1 # concurrent connections per domain (polite default)
  min_interval_ms: 2000 # per-domain minimum spacing between requests
  timeout_secs: 30
  retry_attempts: 4
  user_agent: "ogip-scraper/0.1 (+https://github.com/dataengy/ogip)"
  parse_workers: 0 # 0 = parse inline; >0 = ProcessPoolExecutor (next increment)

raw: # Layer 0 — 1:1 AS-IS (only optional _ingested_at / etl_batch_id added)
  format: parquet
  partitioning: "load_date={date}/etl_batch_id={uuid}"
  add_ingested_at: true
  add_etl_batch_id: true

deploy:
  vps: # manual deploy (ADR-0012); DevOps handled separately
    # Read directly by deploy/vps/*.sh via yq — NOT rendered into .env (the host is
    # operator-specific, so it is supplied per-operator, not committed).
    # Every value below may be overridden by an OGIP_VPS_* env var; see deploy/vps/README.md.
    host: "" # target IP / hostname / ssh_config alias — blank on purpose: set OGIP_VPS_HOST
    user: ogip # unprivileged service account created by provision.sh
    port: 22 # ssh port
    path: /opt/ogip # checkout location on the host
    branch: main # git ref to deploy
    repo_url: https://github.com/dataengy/ogip.git
    compose_profiles: [] # extra compose profiles to enable on the host, e.g. [obs]

  hetzner: # creates the box that deploy.vps then targets (deploy/vps/hetzner.sh)
    # Only used to CREATE/reuse the server; the bootstrap itself is provision.sh. Idempotent
    # by server_name — a second run reuses the existing box rather than billing a second one.
    # Each key is overridable via an OGIP_HETZNER_* env var.
    server_name: ogip-1
    server_type: cx32 # 4 vCPU / 8 GB / 80 GB — DuckDB transform peaks at 2-4 GB (ADR-0008)
    image: ubuntu-24.04
    location: fsn1 # Falkenstein, DE
    ssh_key_path: ~/.ssh/id_ed25519.pub
    ssh_key_name: ogip-deploy # name the key is registered under in the Hetzner project
    api_base: https://api.hetzner.cloud/v1
    token_url: https://console.hetzner.cloud/ # project → Security → API tokens (Read & Write)
    ssh_wait_secs: 300 # bound the post-create wait for sshd; fail loudly instead of hanging
