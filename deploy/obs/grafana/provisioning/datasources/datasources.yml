# OGIP — Grafana datasources (provisioned; never click-configured).
# UIDs are stable and referenced by deploy/obs/grafana/dashboards/*.json.

apiVersion: 1

datasources:
  - name: VictoriaMetrics
    uid: ogip-victoriametrics
    type: prometheus
    access: proxy
    url: http://victoriametrics:8428
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s # must match scrape_interval
      httpMethod: POST

  - name: Loki
    uid: ogip-loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000
