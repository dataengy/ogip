# OGIP — VictoriaMetrics scrape config (Phase 7 · lock lane `obs`).
#
# Prometheus-format; VM reads it via --promscrape.config. Targets are compose service names
# on the `ogip-obs` network. Pipeline metrics do NOT arrive by scraping — the pipeline is a
# short-lived host process (ephemeral Prefect, D3), so it PUSHES OTLP to Alloy, which
# remote-writes here. Scraping is for the stack's own health.

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  external_labels:
    env: local

scrape_configs:
  - job_name: victoriametrics
    static_configs:
      - targets: ["victoriametrics:8428"]

  - job_name: alloy
    metrics_path: /metrics
    static_configs:
      - targets: ["alloy:12345"]

  - job_name: loki
    static_configs:
      - targets: ["loki:3100"]

  - job_name: grafana
    static_configs:
      - targets: ["grafana:3000"]
