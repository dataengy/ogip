# OGIP — base stack: Postgres (landing + platform_meta + Prefect backend), Prefect server,
# MinIO (S3-compatible lake for the `minio` storage profile).
#
# Driven by the Makefile:
#   make up            → postgres + prefect         (core services)
#   make storage-up    → minio + bucket bootstrap   (profile `storage`)
#   make down          → stop everything
#
# Ports/users/buckets come from config/config.yml (the SSoT) via the rendered .env
# (`make render-env`). The `:-` fallbacks mirror the SSoT literals so the stack still boots
# from a bare checkout. Secrets are never inlined — MINIO dev keys below are documented
# throwaway credentials for LOCAL development only (never a real secret; see ADR-0011).
#
# The observability stack (deploy/obs/) is a separate compose project that joins the `ogip`
# network declared here — it currently ships its own; see deploy/obs/docker-compose.obs.yml.

name: ogip

services:
  # --- landing zone + platform metadata + Prefect backend (ADR-0008 / D9) ---
  postgres:
    image: postgres:17-alpine
    container_name: ogip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${OGIP_PG_USER:-ogip}
      POSTGRES_PASSWORD: ${OGIP_PG_PASSWORD:-ogip}
      POSTGRES_DB: ${OGIP_PG_DATABASE:-ogip}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${OGIP_PG_USER:-ogip} -d ${OGIP_PG_DATABASE:-ogip}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [ogip]

  # --- Prefect server (D3: `server` runtime profile; default runtime is ephemeral) ---
  prefect:
    image: prefecthq/prefect:3-latest
    container_name: ogip-prefect
    restart: unless-stopped
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: >-
        postgresql+asyncpg://${OGIP_PG_USER:-ogip}:${OGIP_PG_PASSWORD:-ogip}@postgres:5432/${OGIP_PG_DATABASE:-ogip}
      PREFECT_API_URL: http://localhost:${OGIP_PREFECT_PORT:-4200}/api
    ports:
      - "${OGIP_PREFECT_PORT:-4200}:4200"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://localhost:4200/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks: [ogip]

  # --- S3-compatible lake for the `minio` storage profile (D2 / ADR-0003) ---
  # Same S3 code path as AWS S3 and Cloudflare R2 — only endpoint + credentials differ.
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: ogip-minio
    restart: unless-stopped
    profiles: [storage]
    command: server /data --console-address ":9001"
    # MinIO's OWN root credentials — deliberately NOT the OGIP_S3_* client slots: those may
    # hold real AWS/R2 keys, and feeding a real key in here as a root password is a footgun.
    # For the `minio` backend the two must match; .env-render.py ships both as dev defaults.
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ogipminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ogipminio123}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks: [ogip]

  # --- one-shot: create the raw bucket so the first `make run` has somewhere to land ---
  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: ogip-minio-init
    profiles: [storage]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >-
      /bin/sh -c "
      mc alias set ogip http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing ogip/$${RAW_BUCKET} &&
      mc ls ogip
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ogipminio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ogipminio123}
      RAW_BUCKET: ${OGIP_S3_RAW_BUCKET:-ogip-raw}
    networks: [ogip]

networks:
  ogip:
    name: ogip

volumes:
  postgres-data:
  minio-data:
